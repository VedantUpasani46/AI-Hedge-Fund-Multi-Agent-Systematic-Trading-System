# AI Hedge Fund — Part 9: Cloud Production
# ==========================================
# docker-compose.yml — Full production stack
#
# Services:
#   api       — FastAPI server (Part 8)
#   monitor   — Risk monitor background process (Part 7)
#   strategy  — Strategy engine / agent coordinator (Parts 1-6)
#   redis     — Message queue (upgrade from SQLite MessageBus in Part 2)
#   nginx     — Reverse proxy + TLS termination
#
# Usage:
#   Start all:          docker-compose up -d
#   Logs:               docker-compose logs -f api
#   Scale API:          docker-compose up -d --scale api=3
#   Stop:               docker-compose down
#   Stop + remove vols: docker-compose down -v
#
# Environment:
#   Copy .env.example to .env and fill in secrets before running.
#   NEVER commit .env to git.

version: "3.9"

# ─── Shared configuration ─────────────────────────────────────────────────────
x-common-env: &common-env
  PYTHONPATH: /app
  PYTHONUNBUFFERED: "1"
  ENV: ${ENV:-production}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  API_KEYS: ${API_KEYS:-prod-key-1}
  REDIS_URL: redis://redis:6379/0
  DB_DIR: /app/db

x-common-volumes: &common-volumes
  - app-db:/app/db
  - app-logs:/app/logs
  - app-reports:/app/reports
  - app-data:/app/data

x-restart-policy: &restart-policy
  restart: unless-stopped

# ─── Services ─────────────────────────────────────────────────────────────────
services:

  # ── API Server (FastAPI) ───────────────────────────────────────────────────
  api:
    <<: *restart-policy
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: hedgefund-api:${VERSION:-latest}
    container_name: hedgefund-api
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      <<: *common-env
      WORKERS: ${API_WORKERS:-2}
      PORT: "8000"
    volumes: *common-volumes
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - hedgefund-internal
      - hedgefund-external

  # ── Risk Monitor (background process) ─────────────────────────────────────
  monitor:
    <<: *restart-policy
    image: hedgefund-api:${VERSION:-latest}
    container_name: hedgefund-monitor
    command: ["python", "src/deploy/process_manager.py", "--process", "risk_monitor"]
    environment:
      <<: *common-env
      MONITOR_INTERVAL: ${MONITOR_INTERVAL:-30}
    volumes: *common-volumes
    depends_on:
      - api
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    networks:
      - hedgefund-internal

  # ── Strategy Engine ────────────────────────────────────────────────────────
  strategy:
    <<: *restart-policy
    image: hedgefund-api:${VERSION:-latest}
    container_name: hedgefund-strategy
    command: ["python", "src/deploy/process_manager.py", "--process", "strategy_engine"]
    environment:
      <<: *common-env
      SCAN_INTERVAL_HOURS: ${SCAN_INTERVAL_HOURS:-4}
    volumes: *common-volumes
    depends_on:
      - api
      - redis
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    networks:
      - hedgefund-internal

  # ── Redis (Message Queue) ──────────────────────────────────────────────────
  redis:
    <<: *restart-policy
    image: redis:7-alpine
    container_name: hedgefund-redis
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 300M
    networks:
      - hedgefund-internal

  # ── Nginx (Reverse Proxy + TLS) ────────────────────────────────────────────
  nginx:
    <<: *restart-policy
    image: nginx:1.25-alpine
    container_name: hedgefund-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - hedgefund-external
    profiles:
      - production   # Only start with: docker-compose --profile production up

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  app-db:
    driver: local
  app-logs:
    driver: local
  app-reports:
    driver: local
  app-data:
    driver: local
  redis-data:
    driver: local
  nginx-logs:
    driver: local

# ─── Networks ──────────────────────────────────────────────────────────────────
networks:
  hedgefund-internal:
    driver: bridge
    internal: true          # No external access — only API is exposed
  hedgefund-external:
    driver: bridge
